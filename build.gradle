plugins {
    id 'java'
    id 'org.springframework.boot' version '3.3.6'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.codit'
version = '0.0.1-SNAPSHOT'
description = 'BE_BODA'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Spring AI BOM
    implementation platform('org.springframework.ai:spring-ai-bom:1.0.0')

    // Web + Thymeleaf
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-thymeleaf'

    // Security + OAuth2 (카카오 로그인)
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-client'

    // JPA + PostgreSQL
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    runtimeOnly 'org.postgresql:postgresql'

    // Spring AI - OpenAI (ChatModel + EmbeddingModel)
    implementation 'org.springframework.ai:spring-ai-starter-model-openai'

    // Spring AI - Vector Store (SimpleVectorStore, SearchRequest)
    implementation 'org.springframework.ai:spring-ai-vector-store:1.0.0'

    // PDFBox 3.x
    implementation 'org.apache.pdfbox:pdfbox:3.0.2'

    // AWS SDK (S3만 사용 — OCR은 네이버 클로바로 전환)
    implementation platform('software.amazon.awssdk:bom:2.25.0')
    implementation 'software.amazon.awssdk:s3'

    // JSONB 매핑 (hypersistence)
    implementation 'io.hypersistence:hypersistence-utils-hibernate-63:3.7.3'

    // Swagger
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.6.0'

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // Test
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testCompileOnly 'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}
