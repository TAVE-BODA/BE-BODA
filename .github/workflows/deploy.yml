name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Spring Boot jar
        run: ./gradlew clean build -x test

      - name: Prepare deploy files
        run: |
          mkdir -p deploy
          JAR_FILE=$(ls build/libs/*.jar | grep -v 'plain' | head -n 1)
          cp "$JAR_FILE" deploy/app.jar
          cp Dockerfile deploy/Dockerfile

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "deploy/*"
          target: "/home/ubuntu/boda"
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/boda

            sudo docker stop boda-backend || true
            sudo docker rm boda-backend || true
            sudo docker rmi boda-backend || true

            sudo docker build -t boda-backend .

            sudo docker run -d \
              --name boda-backend \
              --env-file /home/ubuntu/boda/.env \
              -p 8080:8080 \
              boda-backend

            sudo docker ps