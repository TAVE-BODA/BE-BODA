name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Spring Boot jar
        run: ./gradlew clean build -x test

      - name: Prepare deploy files
        run: |
          mkdir -p deploy
          JAR_FILE=$(ls build/libs/*.jar | grep -v 'plain' | head -n 1)
          cp "$JAR_FILE" deploy/app.jar
          cp Dockerfile deploy/Dockerfile

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "deploy/*"
          target: "/home/ubuntu/boda"
          strip_components: 1

      - name: Create .env on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cat > /home/ubuntu/boda/.env << EOF
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            LLM_MINI_MODEL=gpt-5.4-mini
            LLM_FULL_MODEL=gpt-5.4
            MOCK_MODE=false
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
            KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}
            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
            CLOVA_OCR_INVOKE_URL=${{ secrets.CLOVA_OCR_INVOKE_URL }}
            CLOVA_OCR_SECRET_KEY=${{ secrets.CLOVA_OCR_SECRET_KEY }}
            EOF

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            set -e

            cd /home/ubuntu/boda

            sudo docker build -t boda-backend .

            sudo docker rm -f boda-backend || true

            sudo docker run -d \
              --name boda-backend \
              --env-file /home/ubuntu/boda/.env \
              -p 127.0.0.1:8080:8080 \
              --restart unless-stopped \
              boda-backend

            sleep 10
            
            sudo docker image prune -f

            sudo docker ps --filter "name=boda-backend" --filter "status=running" | grep boda-backend

            curl -f http://localhost:8080 || true