spring.application.name=BE_BODA
server.port=8080

# PostgreSQL (RDS)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY:mock}
spring.ai.openai.chat.options.model=${LLM_MINI_MODEL}
spring.ai.openai.chat.options.temperature=0.2
spring.ai.openai.embedding.options.model=text-embedding-3-small

app.llm.mini-model=${LLM_MINI_MODEL}
app.llm.full-model=${LLM_FULL_MODEL}
app.llm.confidence-threshold=0.75

kakao.client-id=${KAKAO_CLIENT_ID}
kakao.client-secret=${KAKAO_CLIENT_SECRET}
kakao.redirect-uri=${KAKAO_REDIRECT_URI}

# spring.security.oauth2.client.registration.kakao 설정은
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8


app.mock-mode=false
app.rag.chunk-size=800
app.rag.chunk-overlap=100
app.rag.top-k=8

# Docker Compose
spring.docker.compose.enabled=false

spring.config.import=optional:file:.env[.properties]

app.front-url=${FRONT_URL:http://localhost:5173}