spring.application.name=BE_BODA

server.port=8080

# OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY:mock}
spring.ai.openai.chat.options.model=${LLM_MINI_MODEL:gpt-5.4-mini}
spring.ai.openai.chat.options.temperature=0.2
spring.ai.openai.embedding.options.model=text-embedding-3-small

app.llm.mini-model=${LLM_MINI_MODEL:gpt-5.4-mini}
app.llm.full-model=${LLM_FULL_MODEL:gpt-5.4}
app.llm.confidence-threshold=0.75

# RDS (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true


spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Thymeleaf (UI ??? ?? ???)
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8


spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

app.mock-mode=false

app.rag.chunk-size=800
app.rag.chunk-overlap=100
app.rag.top-k=8
